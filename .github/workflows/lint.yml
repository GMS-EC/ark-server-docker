name: Lint Scripts

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  shellcheck-syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check bash syntax
        run: |
          for f in scripts/*.sh; do
            echo "Checking $f"
            bash -n "$f"
          done
